version: "3.9"

services:
  api:
    build: .
    container_name: ted_api
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: ted_db
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ted_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: